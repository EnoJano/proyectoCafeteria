<section class="menu-page">
  <div class="container">

    <h1>Nuestro Menú</h1>

    <div *ngFor="let category of categories" class="category">

      <h2>{{ category }}</h2>

      <div class="grid">

        <div class="card" *ngFor="let product of getProductsByCategory(category)">

          <div 
            class="image"
            [style.backgroundImage]="'url(' + product.image + ')'"
          ></div>

          <div class="info">
            <h3>{{ product.name }}</h3>
            <p>{{ product.price }}</p>
          </div>

        </div>

      </div>

    </div>

  </div>
</section>
