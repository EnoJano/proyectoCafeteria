<section class="testimonials">

  <h2>Lo que dicen nuestros clientes</h2>

  <div class="carousel">

    <div class="card" *ngFor="let t of testimonials; let i = index" [ngClass]="getClass(i)">

      <!-- Header -->
      <div class="user">

        <div class="avatar" [style.backgroundImage]="'url(' + t.image + ')'"></div>

        <div class="user-info">
          <h4>{{ t.name }}</h4>

          <div class="stars">
            <span *ngFor="let star of [1,2,3,4,5]; let j = index">
              <span [class.filled]="j < t.rating">★</span>
            </span>
          </div>

        </div>

      </div>

      <!-- Comentario -->
      <p class="text">"{{ t.text }}"</p>

    </div>

  </div>

</section>
