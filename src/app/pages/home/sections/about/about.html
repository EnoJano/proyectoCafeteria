<section class="about" id="about">

    <div class="container">

        <h2>Sobre nosotros</h2>

        <!-- Carrusel -->
        <div class="carousel">
            <div class="image-wrapper">

                <div class="image" *ngFor="let img of images; let i = index" [class.active]="i === currentIndex"
                    [style.backgroundImage]="'url(' + img + ')'"></div>

            </div>
        </div>

        <!-- Texto -->
        <div class="content">
            <p>
                Nuestra cafetería nace con la pasión por el café de especialidad y la experiencia urbana.
            </p>

            <p>
                Cada taza cuenta una historia, cada espacio invita a quedarse.
            </p>
        </div>

    </div>

</section>
