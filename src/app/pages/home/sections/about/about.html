<section class="about" id="about">

    <div class="container">

        <h2>{{ 'ABOUT.TITLE' | translate }}</h2>

        <!-- Carrusel -->
        <div class="carousel">
            <div class="image-wrapper">

                <div class="image" *ngFor="let img of slides; let i = index" [class.active]="i === currentIndex"
                    [style.backgroundImage]="'url(' + img + ')'"></div>

            </div>
        </div>

        <!-- Texto -->
        <div class="content">
            <p>
                {{ 'ABOUT.DESCRIPTION' | translate }}
            </p>
            <br>
            <p>
                {{ 'ABOUT.DESCRIPTION2' | translate }}
            </p>
        </div>

    </div>

</section>
