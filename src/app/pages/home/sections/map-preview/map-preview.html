<section class="map-section">
  <div class="container">

    <h2>{{ 'MAP.TITLE' | translate }}</h2>

    <div class="map-container">

      <iframe src="https://www.google.com/maps?q=Santiago,Chile&output=embed" loading="lazy"></iframe>

      <div class="map-info">
        <h2>{{ 'MAP.TITLE' | translate }}</h2>
        <h3>{{ 'MAP.LOCATION' | translate }}</h3>

        <button class="btn" (click)="abrirMapa()">
          {{ 'MAP.BUTTON' | translate }}
        </button>
      </div>

    </div>

  </div>
</section>
