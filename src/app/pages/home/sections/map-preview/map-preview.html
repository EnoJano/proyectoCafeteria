<section class="map-section">
  <div class="container">

    <h2>Cómo llegar</h2>

    <div class="map-container">

      <iframe
        src="https://www.google.com/maps?q=Santiago,Chile&output=embed"
        loading="lazy"
      ></iframe>

      <div class="map-info">
        <h3>Nuestra ubicación</h3>
        <p>Santiago, Chile</p>

        <button class="btn" (click)="abrirMapa()">
          Abrir en Google Maps
        </button>
      </div>

    </div>

  </div>
</section>
