<nav class="navbar">
  <div class="container nav-content">

    <!-- Logo -->
    <div class="logo">
      ☕ Cafetería
    </div>

    <!-- Links -->
    <ul class="nav-links">
      <li>
        <a (click)="scrollTo('inicio')" [class.active]="activeSection === 'inicio'">
          {{ 'NAV.HOME' | translate }}
        </a>
      </li>

      <li>
        <a (click)="scrollTo('menu')" [class.active]="activeSection === 'menu'">
          {{ 'NAV.MENU' | translate }}
        </a>
      </li>

      <li>
        <a (click)="scrollTo('mapa')" [class.active]="activeSection === 'mapa'">
          {{ 'NAV.MAP' | translate }}
        </a>
      </li>
    </ul>

    <!-- Acciones -->
    <div class="actions">
      <button class="theme-btn" [class.pulse]="pulseActive" (click)="toggleTheme()">
        <span class="icon" [class.rotate]="!themeService.isDarkMode()">
          {{ themeService.isDarkMode() ? '🌙' : '☀️' }}
        </span>
      </button>
      <button (click)="toggleLanguage()">
        {{ languageService.getCurrentLang().toUpperCase() }}
      </button>
    </div>

  </div>
</nav>
