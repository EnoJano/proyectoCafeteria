<nav class="navbar">
  <div class="container nav-content">

    <!-- Logo -->
    <div class="logo">
      ☕ Cafetería
    </div>

    <!-- Links -->
    <ul class="nav-links">
      <li><a href="#">{{ 'NAV.HOME' | translate }}</a></li>
      <li><a href="#">{{ 'NAV.MENU' | translate }}</a></li>
      <li><a href="#">{{ 'NAV.MAP' | translate }}</a></li>
    </ul>

    <!-- Acciones -->
    <div class="actions">
      <button class="theme-btn" [class.pulse]="pulseActive" (click)="toggleTheme()">
        <span class="icon" [class.rotate]="!themeService.isDarkMode()">
          {{ themeService.isDarkMode() ? '🌙' : '☀️' }}
        </span>
      </button>
      <button (click)="toggleLanguage()">
        {{ languageService.getCurrentLang().toUpperCase() }}
      </button>
    </div>

  </div>
</nav>
